# infra/prometheus/prometheus.yml
# US-025: Scrape config para IMS Modular Monolith

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: ims-monolith

rule_files:
  # - "alerts.yml"

scrape_configs:
  - job_name: "ims-app"
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics
    scheme: http

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
