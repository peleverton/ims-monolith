name: CI — Build & Test

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup .NET ────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Cache NuGet ───────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ── Restore ───────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore ims-monolith.sln

      # ── Build ─────────────────────────────────────────────
      - name: Build (Release)
        run: dotnet build ims-monolith.sln -c Release --no-restore

      # ── Test + Coverage ───────────────────────────────────
      - name: Run tests with coverage
        run: |
          dotnet test backend/tests/IMS.Modular.Tests.csproj \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # ── Publish test results ──────────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx
          fail-on-error: true

      # ── Upload coverage ───────────────────────────────────
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: "**/coverage.opencover.xml"
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # Job 2: Build Blazor WASM
  # ============================================================
  build-blazor:
    name: Build Blazor WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-blazor-${{ hashFiles('frontend/apps/blazor-modules/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-blazor-

      - name: Publish Blazor WASM
        run: |
          dotnet publish frontend/apps/blazor-modules \
            -c Release \
            -o frontend/apps/blazor-modules/publish \
            --nologo

      - name: Upload Blazor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wwwroot
          path: frontend/apps/blazor-modules/publish/wwwroot
          retention-days: 1

  # ============================================================
  # Job 3: Build Next.js (com artefatos Blazor)
  # ============================================================
  build-nextjs:
    name: Build Next.js Shell
    runs-on: ubuntu-latest
    needs: build-blazor
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/apps/next-shell/package-lock.json

      - name: Download Blazor artifacts
        uses: actions/download-artifact@v4
        with:
          name: blazor-wwwroot
          path: frontend/apps/next-shell/public/_blazor

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/apps/next-shell

      - name: Build Next.js
        run: npm run build
        working-directory: frontend/apps/next-shell
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:5049
