<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMS Blazor Modules</title>
    <base href="/_blazor/" />
    <!-- MudBlazor -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="BlazorModules.styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Custom Elements registrados — não há div#app estático -->
    <!-- Os componentes são montados via RegisterAsCustomElement -->

    <div id="blazor-error-ui" style="display:none">
        Erro inesperado. <a href="." class="reload">Recarregar</a>
    </div>

    <!--
        Bridge JS: expõe window.imsAuth para que o Blazor leia o token do Next.js.
        O Next.js deve definir window.imsAuth.getToken antes de carregar este script.
    -->
    <script>
        window.imsAuth = window.imsAuth || {
            getToken: () => null
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
