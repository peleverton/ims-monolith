# =============================================================
# US-025: docker-compose.observability.yml
# Overlay de observabilidade: Prometheus + Grafana
# =============================================================
# Uso (combinado com docker-compose.yml):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Grafana UI:   http://localhost:3000  (admin / admin)
# Prometheus:   http://localhost:9090
# =============================================================

version: "3.9"

services:

  # ─────────────────────────────────────────────────────────
  # Prometheus
  # ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ims-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ims-net

  # ─────────────────────────────────────────────────────────
  # Grafana
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ims-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ims-net

  # ─────────────────────────────────────────────────────────
  # Jaeger — Distributed Tracing (US-027)
  # ─────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ims-jaeger
    restart: unless-stopped
    ports:
      - "6831:6831/udp"   # Jaeger agent (compact thrift)
      - "16686:16686"      # Jaeger UI
      - "4317:4317"        # OTLP gRPC
      - "4318:4318"        # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ims-net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ims-net:
    external: true
